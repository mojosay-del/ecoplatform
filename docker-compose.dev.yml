services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ecoplatform
      POSTGRES_PASSWORD: ecoplatform
      POSTGRES_DB: ecoplatform
    ports:
      - "5433:5432"
    volumes:
      - pgdata18root:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecoplatform -d ecoplatform"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata18root:
