# ─────────────────────────────────────────────────────────────────────────
# Прод-запуск ЭкоПлатформы на ОДНОМ сервере Ubuntu (Timeweb «Облачные серверы»).
#
# Контейнеры:
#   • api   — NestJS-бэкенд        (порт 4000, только внутренняя сеть)
#   • web   — Next.js-сайт         (порт 3000, только внутренняя сеть)
#   • caddy — приём трафика из интернета + автоматический HTTPS (порты 80/443)
#   • redis — кэш сессий и лимитов (необязателен — можно удалить блок)
#
# База данных (Timeweb Managed PostgreSQL) и S3 — ВНЕШНИЕ, их здесь нет:
# адреса и ключи берутся из deploy/.env.prod.
#
# Запуск ИЗ КОРНЯ репозитория на сервере:
#   docker compose -f docker-compose.prod.yml --env-file deploy/.env.prod up -d --build
#
# Контекст сборки = корень репозитория (так требуют оба Dockerfile).
# ─────────────────────────────────────────────────────────────────────────
# Ротация логов Docker: по умолчанию json-file-драйвер пишет БЕЗ лимита и со
# временем съедает диск VPS. Общий пресет — 5 файлов по 10 МБ на контейнер.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    # Все рантайм-переменные (БД, JWT, S3 …) — из этого файла.
    env_file: deploy/.env.prod
    # Наружу не публикуем: к API ходит только caddy по внутренней сети.
    expose:
      - "4000"
    depends_on:
      - redis
    logging: *default-logging
    # Liveness: busybox wget есть в node:alpine. /api/health не трогает БД/Redis.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        # ВАЖНО: NEXT_PUBLIC_* «зашиваются» в сайт на ЭТАПЕ СБОРКИ, не в рантайме.
        # Значение берётся из deploy/.env.prod (через --env-file при запуске).
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        # Карта MapLibre: self-host стиль на нашем домене + origin тайлов для CSP.
        NEXT_PUBLIC_MAP_STYLE_URL: ${NEXT_PUBLIC_MAP_STYLE_URL}
        NEXT_PUBLIC_MAP_TILES_ORIGIN: ${NEXT_PUBLIC_MAP_TILES_ORIGIN}
    restart: unless-stopped
    env_file: deploy/.env.prod
    expose:
      - "3000"
    logging: *default-logging
    # Liveness: корень отдаёт лендинг (200 для анонима) — Next-сервер жив.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    # Единственный контейнер, открытый в интернет.
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      # Самостоятельные векторные тайлы карты (eco.pmtiles + шрифты/спрайты/стиль).
      # Лежат ВНЕ репозитория (~7.7ГБ); caddy раздаёт их по пути /maptiles.
      - ../eco-tiles/maptiles:/srv/maptiles:ro
      - caddy_data:/data # здесь caddy хранит выпущенные TLS-сертификаты
      - caddy_config:/config
    depends_on:
      - api
      - web
    logging: *default-logging

  # Необязательный кэш. Приложение работает и без него (деградирует мягко).
  # Чтобы отключить — удалите этот блок и очистите REDIS_URL в .env.prod.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    # Портов наружу нет: redis доступен только другим контейнерам.
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  caddy_data:
  caddy_config:
