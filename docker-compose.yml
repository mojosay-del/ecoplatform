# ═════════════════════════════════════════════════════════════════════════
# Корневой docker-compose для Timeweb App Platform (режим «Docker Compose»).
# Платформа читает ИМЕННО этот файл из корня репозитория.
#
# Один домен, один app, три сервиса:
#   • proxy — ПЕРВЫЙ сервис: платформа публикует его на домене с HTTPS;
#             внутри роутит /api → api, остальное → web (один origin, без CORS);
#   • web   — Next.js (внутренний);
#   • api   — NestJS (внутренний); миграции применяет сам при старте.
#
# ВНЕШНИЕ сервисы (НЕ здесь): Timeweb PostgreSQL и S3 — задаются переменными.
# Redis на старте не используем (приложение работает и без него); при желании
# добавим отдельным сервисом позже.
#
# Ограничения платформы, которые тут учтены: порты 80/443 заняты платформой,
# `volumes` запрещены, наружу публикуется только первый сервис.
#
# Переменные (DATABASE_URL, JWT_*, S3_* и т.д.) задаются в мастере App Platform
# в разделе «Переменные» — отсюда они подставляются через ${...}.
# Для локального запуска прод-сборки: docker compose --env-file deploy/.env.prod up --build
# (локальная разработка — в docker-compose.dev.yml).
# ═════════════════════════════════════════════════════════════════════════
services:
  proxy:
    build:
      context: .
      dockerfile: deploy/proxy/Dockerfile
      args:
        # Зеркало Docker Hub от Timeweb — прямой Docker Hub из РФ режется до ~25 КБ/с.
        IMAGE_REGISTRY: dockerhub.timeweb.cloud/library
    restart: unless-stopped
    expose:
      - "8080"
    depends_on:
      - web
      - api

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Адрес API «зашивается» в сайт на этапе сборки. Один домен → /api.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        # Зеркало Docker Hub от Timeweb (быстрая загрузка базовых образов).
        IMAGE_REGISTRY: dockerhub.timeweb.cloud/library
    restart: unless-stopped
    expose:
      - "3000"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        # Зеркало Docker Hub от Timeweb (быстрая загрузка базовых образов).
        IMAGE_REGISTRY: dockerhub.timeweb.cloud/library
    restart: unless-stopped
    # Перечисляем явно, чтобы переменные из панели гарантированно попали в контейнер.
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      WEB_ORIGIN: ${WEB_ORIGIN}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL}
      PLATFORM_OWNER_EMAIL: ${PLATFORM_OWNER_EMAIL}
      METRICS_BASIC_USER: ${METRICS_BASIC_USER}
      METRICS_BASIC_PASSWORD: ${METRICS_BASIC_PASSWORD}
      LOG_LEVEL: ${LOG_LEVEL}
      PWNED_PASSWORDS_CHECK_ENABLED: ${PWNED_PASSWORDS_CHECK_ENABLED}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
      SEED_DEMO_PASSWORD: ${SEED_DEMO_PASSWORD}
    expose:
      - "4000"
