global:
  resolve_timeout: 5m
  smtp_smarthost: smtp.example.com:587
  smtp_from: alerts@example.com
  smtp_auth_username: alerts@example.com
  smtp_auth_password_file: /run/secrets/alertmanager_smtp_password
  smtp_require_tls: true
  telegram_bot_token_file: /run/secrets/alertmanager_telegram_bot_token

route:
  receiver: ops-email
  group_by: ["service", "severity", "alertname"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - receiver: ops-telegram
      matchers:
        - severity="critical"
      repeat_interval: 30m

receivers:
  - name: ops-email
    email_configs:
      - to: alerts@example.com
        send_resolved: true
  - name: ops-telegram
    telegram_configs:
      - chat_id_file: /run/secrets/alertmanager_telegram_chat_id
        parse_mode: HTML
        send_resolved: true
